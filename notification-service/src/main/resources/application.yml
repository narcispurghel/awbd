spring:
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  application:
    name: notification-service
  profiles:
    active: dev
  cloud:
    service-registry:
      auto-registration:
        enabled: false
  output:
    ansi:
      enabled: always
server:
  port: 8084
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
