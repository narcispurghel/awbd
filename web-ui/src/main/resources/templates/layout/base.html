<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, body)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' · PAWS'">PAWS</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="d-flex flex-column min-vh-100 bg-body-tertiary">
<header th:replace="~{fragments/nav :: nav}"></header>

<main class="container py-4 flex-grow-1">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <th:block th:replace="${body}"></th:block>
</main>

<footer class="site-footer border-top mt-auto">
    <div class="container py-4 py-md-5">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-lg-5">
                <a class="site-footer__brand d-inline-flex align-items-center gap-2 text-decoration-none mb-2"
                   th:href="@{/}">
                    <i class="bi bi-heart-fill"></i>
                    <span class="fw-semibold">PAWS</span>
                </a>
                <p class="site-footer__blurb mb-0">
                    Browse adoptable animals, manage requests, and keep your profile ready for a new home match.
                </p>
            </div>

            <div class="col-12 col-lg-7">
                <div class="row g-4 row-cols-1 row-cols-sm-2">
                    <div class="col">
                        <h2 class="site-footer__heading">Explore</h2>
                        <ul class="site-footer__links list-unstyled mb-0">
                            <li><a th:href="@{/}">Home</a></li>
                            <li><a th:href="@{/animals}">Animals</a></li>
                            <li><a th:href="@{/adoptions/me}">My adoptions</a></li>
                        </ul>
                    </div>
                    <div class="col">
                        <h2 class="site-footer__heading">Account</h2>
                        <ul class="site-footer__links list-unstyled mb-0">
                            <li><a th:href="@{/profile}">Profile</a></li>
                            <li><a th:href="@{/login}">Log in</a></li>
                            <li><a th:href="@{/register}">Register</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="site-footer__meta border-top pt-3 mt-4 d-flex flex-column flex-md-row justify-content-between gap-2">
            <span>&copy; PAWS. All rights reserved.</span>
            <span>Animal adoption platform for browsing, tracking, and applying in one place.</span>
        </div>
    </div>
</footer>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
