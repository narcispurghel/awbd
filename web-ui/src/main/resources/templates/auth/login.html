<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{layout/base :: layout('Log in', ~{::content})}">
<section th:fragment="content" class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Log in</h1>
                <form th:action="@{/login}" th:object="${loginForm}" method="post" novalidate>
                    <div th:replace="~{fragments/form-errors :: globals}"></div>
                    <input type="hidden" name="redirect" th:value="${redirect}"/>
                    <div class="mb-3">
                        <label class="form-label" for="email">Email</label>
                        <input id="email" type="email" th:field="*{email}"
                               class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('email')})}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <input id="password" type="password" th:field="*{password}"
                               class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('password')})}"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Log in</button>
                </form>
                <p class="text-center small text-body-secondary mt-3 mb-0">
                    No account? <a th:href="@{/register}">Register</a>
                </p>
            </div>
        </div>
    </div>
</section>
</th:block>
</body>
</html>
