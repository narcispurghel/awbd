<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{layout/base :: layout('Account settings', ~{::content})}">
<section th:fragment="content">
    <h1 class="h3 mb-3">Account settings</h1>

    <div class="card shadow-sm mb-4">
        <div class="card-header">Change password</div>
        <div class="card-body">
            <div th:replace="~{fragments/form-errors :: globals('changePasswordForm')}"></div>
            <form th:action="@{/account/password}" th:object="${changePasswordForm}" method="post" novalidate>
                <div class="mb-3">
                    <label class="form-label" for="currentPassword">Current password</label>
                    <input id="currentPassword" type="password" th:field="*{currentPassword}"
                           class="form-control" th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid'"/>
                    <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('currentPassword')})}"></div>
                </div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="newPassword">New password</label>
                        <input id="newPassword" type="password" th:field="*{newPassword}"
                               class="form-control" th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('newPassword')})}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="confirmPassword">Confirm new password</label>
                        <input id="confirmPassword" type="password" th:field="*{confirmPassword}"
                               class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('confirmPassword')})}"></div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-3">Update password</button>
            </form>
        </div>
    </div>

    <div class="card shadow-sm border-danger">
        <div class="card-header text-danger">
            <i class="bi bi-exclamation-octagon me-1"></i>Danger zone
        </div>
        <div class="card-body">
            <p class="mb-3">Deactivating your account disables your access. Contact support to restore it.</p>
            <button type="button" class="btn btn-outline-danger" data-bs-toggle="collapse" data-bs-target="#deactivate-form">
                Deactivate account
            </button>
            <div id="deactivate-form" class="collapse mt-3"
                 th:classappend="${#fields.hasErrors('${deactivateForm.*}')} ? 'show'">
                <div th:replace="~{fragments/form-errors :: globals('deactivateForm')}"></div>
                <form th:action="@{/account/deactivate}" th:object="${deactivateForm}" method="post"
                      onsubmit="return confirm('Deactivate your account? This cannot be undone from the UI.');"
                      novalidate>
                    <div class="mb-3">
                        <label class="form-label" for="dpassword">Confirm password</label>
                        <input id="dpassword" type="password" th:field="*{password}"
                               class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('password')})}"></div>
                    </div>
                    <div class="form-check mb-3">
                        <input id="confirm" type="checkbox" th:field="*{confirm}" class="form-check-input"/>
                        <label class="form-check-label" for="confirm">I understand and want to deactivate.</label>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('confirm')})}"></div>
                    </div>
                    <button type="submit" class="btn btn-danger">Permanently deactivate</button>
                </form>
            </div>
        </div>
    </div>
</section>
</th:block>
</body>
</html>
