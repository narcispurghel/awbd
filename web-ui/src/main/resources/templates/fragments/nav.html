<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="nav" class="navbar navbar-expand-md bg-body border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/}">
            <i class="bi bi-heart-fill text-danger me-1"></i>PAWS
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="nav" class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto align-items-md-center gap-md-2">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link disabled" aria-disabled="true" tabindex="-1" href="#"
                       title="Coming soon">Animals</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link disabled" aria-disabled="true" tabindex="-1" href="#"
                       title="Coming soon">My adoptions</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link disabled" aria-disabled="true" tabindex="-1" href="#"
                       title="Coming soon">Admin</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto align-items-md-center gap-md-2">
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}">Log in</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-primary btn-sm" th:href="@{/register}">Register</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name">user</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-person me-1"></i>Profile</a></li>
                        <li><a class="dropdown-item" th:href="@{/account}"><i class="bi bi-gear me-1"></i>Settings</a></li>
                        <li><hr class="dropdown-divider"/></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="px-2">
                                <button type="submit" class="btn btn-link p-0 text-decoration-none">
                                    <i class="bi bi-box-arrow-right me-1"></i>Log out
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
