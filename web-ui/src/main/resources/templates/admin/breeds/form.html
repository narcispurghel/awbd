<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{layout/base :: layout(${pageTitle}, ~{::content})}">
<section th:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a th:href="@{/admin}">Admin</a></li>
            <li class="breadcrumb-item"><a th:href="@{/admin/breeds}">Breeds</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${crumbLabel}">New</li>
        </ol>
    </nav>

    <h1 class="h3 mb-3" th:text="${heading}">Breed</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="${breedId} == null ? @{/admin/breeds} : @{/admin/breeds/{id}(id=${breedId})}"
                  th:object="${breedForm}" method="post" class="needs-validation" novalidate>
                <div th:replace="~{fragments/form-errors :: globals}"></div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="speciesId">Species</label>
                        <select id="speciesId" th:field="*{speciesId}" required
                                class="form-select"
                                th:classappend="${#fields.hasErrors('speciesId')} ? 'is-invalid'">
                            <option value="">— Select species —</option>
                            <option th:each="s : ${speciesOptions}"
                                    th:value="${s.id}" th:text="${s.name}">Species</option>
                        </select>
                        <div class="invalid-feedback">Please choose a species.</div>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('speciesId')})}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="name">Name</label>
                        <input id="name" type="text" th:field="*{name}" required maxlength="80"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
                        <div class="invalid-feedback">Please enter the breed name.</div>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('name')})}"></div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a th:href="@{/admin/breeds}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary" th:text="${submitLabel}">Save</button>
                </div>
            </form>
        </div>
    </div>

</section>
</th:block>
</body>
</html>
