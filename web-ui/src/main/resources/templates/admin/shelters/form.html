<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{layout/base :: layout(${pageTitle}, ~{::content})}">
<section th:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a th:href="@{/admin}">Admin</a></li>
            <li class="breadcrumb-item"><a th:href="@{/admin/shelters}">Shelters</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${crumbLabel}">New</li>
        </ol>
    </nav>

    <h1 class="h3 mb-3" th:text="${heading}">Shelter</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="${shelterId} == null ? @{/admin/shelters} : @{/admin/shelters/{id}(id=${shelterId})}"
                  th:object="${shelterForm}" method="post" novalidate>
                <div th:replace="~{fragments/form-errors :: globals}"></div>

                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label" for="name">Name</label>
                        <input id="name" type="text" th:field="*{name}" maxlength="120"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('name')})}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="countryCode">Country code</label>
                        <input id="countryCode" type="text" th:field="*{countryCode}" maxlength="2"
                               placeholder="RO" style="text-transform: uppercase"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('countryCode')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('countryCode')})}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="city">City</label>
                        <input id="city" type="text" th:field="*{city}" maxlength="100"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('city')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('city')})}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="contactEmail">Contact email</label>
                        <input id="contactEmail" type="email" th:field="*{contactEmail}" maxlength="255"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('contactEmail')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('contactEmail')})}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="contactPhone">Contact phone</label>
                        <input id="contactPhone" type="tel" th:field="*{contactPhone}" maxlength="30"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('contactPhone')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('contactPhone')})}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="address">Address</label>
                        <input id="address" type="text" th:field="*{address}" maxlength="255"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('address')})}"></div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a th:href="@{/admin/shelters}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary" th:text="${submitLabel}">Save</button>
                </div>
            </form>
        </div>
    </div>

</section>
</th:block>
</body>
</html>
