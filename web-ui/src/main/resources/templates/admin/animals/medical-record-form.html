<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{layout/base :: layout('Admin · Edit medical record', ~{::content})}">
<section th:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a th:href="@{/admin}">Admin</a></li>
            <li class="breadcrumb-item"><a th:href="@{/animals/{id}(id=${animal.id})}" th:text="${animal.name}">Animal</a></li>
            <li class="breadcrumb-item active" aria-current="page">Edit medical record</li>
        </ol>
    </nav>

    <h1 class="h3 mb-3">Edit medical record</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/animals/{aid}/medical-records/{rid}(aid=${animal.id},rid=${recordId})}"
                  th:object="${medicalRecordForm}" method="post" class="needs-validation" novalidate>
                <div th:replace="~{fragments/form-errors :: globals}"></div>

                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label" for="title">Title</label>
                        <input id="title" type="text" th:field="*{title}" required maxlength="120"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"/>
                        <div class="invalid-feedback">Please enter a title for the record.</div>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('title')})}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="examinationDate">Examination date</label>
                        <input id="examinationDate" type="date" th:field="*{examinationDate}" required
                               class="form-control"
                               th:classappend="${#fields.hasErrors('examinationDate')} ? 'is-invalid'"/>
                        <div class="invalid-feedback">Please provide the examination date.</div>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('examinationDate')})}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="treatment">Treatment <span class="text-muted small">(optional)</span></label>
                        <input id="treatment" type="text" th:field="*{treatment}" maxlength="255"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('treatment')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('treatment')})}"></div>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label" for="weightKg">Weight (kg) <span class="text-muted small">(optional)</span></label>
                        <input id="weightKg" type="number" step="0.01" min="0"
                               th:field="*{weightKg}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('weightKg')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('weightKg')})}"></div>
                    </div>

                    <div class="col-md-3 d-flex align-items-end">
                        <div class="form-check">
                            <input id="followUpRequired" type="checkbox" th:field="*{followUpRequired}" class="form-check-input"/>
                            <label for="followUpRequired" class="form-check-label">Follow-up required</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="notes">Notes <span class="text-muted small">(optional)</span></label>
                        <textarea id="notes" th:field="*{notes}" rows="4" maxlength="2000"
                                  class="form-control"
                                  th:classappend="${#fields.hasErrors('notes')} ? 'is-invalid'"></textarea>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('notes')})}"></div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a th:href="@{/animals/{id}(id=${animal.id})} + '#medical'" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle me-1"></i>Save changes
                    </button>
                </div>
            </form>
        </div>
    </div>

</section>
</th:block>
</body>
</html>
