<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{layout/base :: layout(${pageTitle}, ~{::content})}">
<section th:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a th:href="@{/admin}">Admin</a></li>
            <li class="breadcrumb-item"><a th:href="@{/animals}">Animals</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${crumbLabel}">New</li>
        </ol>
    </nav>

    <h1 class="h3 mb-3" th:text="${heading}">Animal</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="${animalId} == null ? @{/admin/animals} : @{/admin/animals/{id}(id=${animalId})}"
                  th:object="${animalForm}" method="post" class="needs-validation" novalidate
                  data-animal-form>
                <div th:replace="~{fragments/form-errors :: globals}"></div>

                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label" for="name">Name</label>
                        <input id="name" type="text" th:field="*{name}" required maxlength="120"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
                        <div class="invalid-feedback">Please enter the animal's name.</div>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('name')})}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="status">Status</label>
                        <select id="status" th:field="*{status}"
                                class="form-select"
                                th:classappend="${#fields.hasErrors('status')} ? 'is-invalid'">
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.name()}">STATUS</option>
                        </select>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('status')})}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="shelterId">Shelter</label>
                        <select id="shelterId" th:field="*{shelterId}" required
                                class="form-select"
                                th:classappend="${#fields.hasErrors('shelterId')} ? 'is-invalid'">
                            <option value="">— Select shelter —</option>
                            <option th:each="s : ${shelterOptions}"
                                    th:value="${s.id}"
                                    th:text="${s.name + ' (' + s.city + ')'}">Shelter</option>
                        </select>
                        <div class="invalid-feedback">Please choose a shelter.</div>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('shelterId')})}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="sex">Sex</label>
                        <select id="sex" th:field="*{sex}"
                                class="form-select"
                                th:classappend="${#fields.hasErrors('sex')} ? 'is-invalid'">
                            <option th:each="s : ${sexes}" th:value="${s}" th:text="${s.name()}">SEX</option>
                        </select>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('sex')})}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="speciesId">Species</label>
                        <select id="speciesId" th:field="*{speciesId}" required
                                class="form-select"
                                th:classappend="${#fields.hasErrors('speciesId')} ? 'is-invalid'"
                                data-breed-filter-source>
                            <option value="">— Select species —</option>
                            <option th:each="s : ${speciesOptions}"
                                    th:value="${s.id}" th:text="${s.name}">Species</option>
                        </select>
                        <div class="invalid-feedback">Please choose a species.</div>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('speciesId')})}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="breedId">Breed <span class="text-muted small">(optional)</span></label>
                        <select id="breedId" th:field="*{breedId}"
                                class="form-select"
                                th:classappend="${#fields.hasErrors('breedId')} ? 'is-invalid'"
                                data-breed-filter-target>
                            <option value="">— No breed —</option>
                            <option th:each="b : ${breedOptions}"
                                    th:value="${b.id}"
                                    th:attr="data-species-id=${b.speciesId}"
                                    th:text="${b.name}">Breed</option>
                        </select>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('breedId')})}"></div>
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="tagIds">Tags <span class="text-muted small">(optional)</span></label>
                        <select id="tagIds" th:field="*{tagIds}" multiple size="4" class="form-select">
                            <option th:each="t : ${tagOptions}"
                                    th:value="${t.id}"
                                    th:text="${t.name}">Tag</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="intakeDate">Intake date</label>
                        <input id="intakeDate" type="date" th:field="*{intakeDate}" required
                               class="form-control"
                               th:classappend="${#fields.hasErrors('intakeDate')} ? 'is-invalid'"/>
                        <div class="invalid-feedback">Please provide the intake date.</div>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('intakeDate')})}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="birthDate">Birth date <span class="text-muted small">(optional)</span></label>
                        <input id="birthDate" type="date" th:field="*{birthDate}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('birthDate')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('birthDate')})}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="adoptionFee">Adoption fee <span class="text-muted small">(optional)</span></label>
                        <input id="adoptionFee" type="number" step="0.01" min="0"
                               th:field="*{adoptionFee}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('adoptionFee')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('adoptionFee')})}"></div>
                    </div>

                    <div class="col-md-6 d-flex align-items-end">
                        <div class="form-check me-4">
                            <input id="vaccinated" type="checkbox" th:field="*{vaccinated}" class="form-check-input"/>
                            <label for="vaccinated" class="form-check-label">Vaccinated</label>
                        </div>
                        <div class="form-check">
                            <input id="neutered" type="checkbox" th:field="*{neutered}" class="form-check-input"/>
                            <label for="neutered" class="form-check-label">Neutered</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label" for="description">Description <span class="text-muted small">(optional)</span></label>
                        <textarea id="description" th:field="*{description}" rows="4" maxlength="2000"
                                  class="form-control"
                                  th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('description')})}"></div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a th:href="${animalId} == null ? @{/animals} : @{/animals/{id}(id=${animalId})}"
                       class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary" th:text="${submitLabel}">Save</button>
                </div>
            </form>
        </div>
    </div>

    <section th:if="${animalId != null}" id="photos" class="card shadow-sm mt-4">
        <div class="card-body">
            <h2 class="h5 mb-3"><i class="bi bi-images me-2"></i>Photos</h2>

            <div th:if="${#lists.isEmpty(photos)}" class="alert alert-light border mb-3">
                No photos yet.
            </div>

            <div th:unless="${#lists.isEmpty(photos)}" class="row g-2 mb-3">
                <div th:each="p : ${photos}" class="col-6 col-md-4 col-lg-3">
                    <div class="position-relative">
                        <img th:src="@{/animals/{aid}/photos/{pid}(aid=${animalId},pid=${p.id()})}"
                             alt="Animal photo"
                             class="img-fluid rounded border"
                             style="aspect-ratio: 1 / 1; object-fit: cover; width: 100%"/>
                        <form th:action="@{/admin/animals/{aid}/photos/{pid}/delete(aid=${animalId},pid=${p.id()})}"
                              method="post"
                              class="position-absolute top-0 end-0 m-1">
                            <button type="submit"
                                    class="btn btn-sm btn-danger"
                                    title="Remove photo"
                                    onclick="return confirm('Remove this photo?');">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <form th:action="@{/admin/animals/{id}/photos(id=${animalId})}"
                  method="post" enctype="multipart/form-data" class="row g-2 align-items-end">
                <div class="col-md-9">
                    <label class="form-label" for="photoFile">Add a photo</label>
                    <input id="photoFile" type="file" name="file" accept="image/*" required class="form-control"/>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-upload me-1"></i>Upload
                    </button>
                </div>
            </form>
        </div>
    </section>

</section>
</th:block>
</body>
</html>
