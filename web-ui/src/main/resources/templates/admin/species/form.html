<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{layout/base :: layout(${pageTitle}, ~{::content})}">
<section th:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a th:href="@{/admin}">Admin</a></li>
            <li class="breadcrumb-item"><a th:href="@{/admin/species}">Species</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${crumbLabel}">New</li>
        </ol>
    </nav>

    <h1 class="h3 mb-3" th:text="${heading}">Species</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="${speciesId} == null ? @{/admin/species} : @{/admin/species/{id}(id=${speciesId})}"
                  th:object="${speciesForm}" method="post" novalidate>
                <div th:replace="~{fragments/form-errors :: globals}"></div>

                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label" for="name">Name</label>
                        <input id="name" type="text" th:field="*{name}" maxlength="80"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
                        <div th:replace="~{fragments/form-errors :: errors(${#fields.errors('name')})}"></div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a th:href="@{/admin/species}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary" th:text="${submitLabel}">Save</button>
                </div>
            </form>
        </div>
    </div>

</section>
</th:block>
</body>
</html>
