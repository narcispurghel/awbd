<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:replace="~{layout/base :: layout('Admin · Species', ~{::content})}">
<section th:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a th:href="@{/admin}">Admin</a></li>
            <li class="breadcrumb-item active" aria-current="page">Species</li>
        </ol>
    </nav>

    <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h3 mb-0">Species</h1>
        <a th:href="@{/admin/species/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>Add species
        </a>
    </div>

    <div th:if="${#lists.isEmpty(species)}" class="alert alert-light border text-center mb-0">
        No species yet. Click <strong>Add species</strong> to create the first one.
    </div>

    <div th:unless="${#lists.isEmpty(species)}" class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>Name</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${species}">
                    <td th:text="${s.name}">Name</td>
                    <td class="text-end">
                        <a th:href="@{/admin/species/{id}/edit(id=${s.id})}"
                           class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil me-1"></i>Edit
                        </a>
                        <form th:action="@{/admin/species/{id}/delete(id=${s.id})}" method="post"
                              class="d-inline"
                              onsubmit="return confirm('Delete this species? This cannot be undone.')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash me-1"></i>Delete
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</section>
</th:block>
</body>
</html>
