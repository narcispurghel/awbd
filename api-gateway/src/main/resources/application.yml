spring:
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  application:
    name: api-gateway
  output:
    ansi:
      enabled: always
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: animal-service-api
              uri: lb://animal-service
              predicates:
                - Path=/api/v1/shelters/**,/api/v1/species/**,/api/v1/breeds/**,/api/v1/tags/**,/api/v1/animals/**
            - id: user-service-api
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**
            - id: adoption-service-api
              uri: lb://adoption-service
              predicates:
                - Path=/api/v1/adoptions/**
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
server:
  port: 8080
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
jwt:
  secret: ${JWT_SECRET}
