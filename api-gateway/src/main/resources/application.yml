spring:
  application:
    name: api-gateway
  output:
    ansi:
      enabled: always
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service-api
              uri: lb://user-service
              predicates:
                - Path=/api/v1/**
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
server:
  port: 8080
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
jwt:
  secret: ${JWT_SECRET}
