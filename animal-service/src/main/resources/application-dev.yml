# Local dev settings — loaded from repo-root .env via DotenvLoader (see common module).
spring:
  datasource:
    url: ${DB_ANIMALS_URL:${DB_URL}}
    username: ${DB_ANIMALS_USER:${DB_USER}}
    password: ${DB_ANIMALS_PASSWORD:${DB_PASSWORD}}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
cors:
  allowed-origins: http://localhost:8090
storage:
  s3:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    region: ${MINIO_REGION:us-east-1}
    access-key: ${MINIO_ROOT_USER:minioadmin}
    secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
    bucket: ${MINIO_BUCKET:animal-photos}
