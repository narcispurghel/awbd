spring:
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  application:
    name: user-service
  profiles:
    active: dev
  output:
    ansi:
      enabled: always
server:
  port: 8081
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000
