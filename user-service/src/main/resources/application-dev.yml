# Local dev settings — loaded from repo-root .env via DotenvLoader (see common module).
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
cors:
  allowed-origins: http://localhost:8090
